<div class="page" style="max-width:880px;margin:auto">
  <div class="card card-pad"><h1>{{postId?'Edit Post':'Create New Post'}}</h1><div class="alert" *ngIf="error">{{error}}</div>
    <form (ngSubmit)="save()">
      <div class="form-group"><label>Title *</label><input class="input" name="title" [(ngModel)]="form.title" placeholder="What's your question or topic?"/></div>
      <div class="form-group"><label>Content *</label><textarea class="textarea" name="content" [(ngModel)]="form.content" placeholder="Provide details, code examples, or context..." rows="10"></textarea><p class="muted">Nội dung tối thiểu 20 ký tự</p></div>
      <div class="form-group"><label>Tags * (max 5)</label><div style="display:flex;gap:10px"><input class="input" name="tagInput" [(ngModel)]="tagInput" (keyup.enter)="addTag();$event.preventDefault()" placeholder="Add a tag..."/><button class="btn btn-outline" type="button" (click)="addTag()">Add</button></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><button class="badge badge-gray" *ngFor="let t of form.tags" type="button" (click)="removeTag(t)">{{t}} ×</button></div><p class="muted">Suggested tags:</p><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="badge badge-gray suggested-tag" *ngFor="let t of suggested" type="button" (click)="addTag(t)">{{t}}</button></div>
      </div>
      <div class="form-group">
        <label>Images / Files</label>
        <input class="input" type="file" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.txt,.zip" (change)="onFilesSelected($event)" />
        <p class="muted">Ảnh/file sẽ được upload qua API lên MinIO Docker <b>localhost:9000</b>. Tối đa 5 file, mỗi file tối đa 10MB.</p>
        <div class="attachment-grid" *ngIf="attachments.length">
          <div class="attachment-card" *ngFor="let a of attachments">
            <img *ngIf="isImage(a)" [src]="fileViewUrl(a)" [alt]="a.originalFileName" />
            <div *ngIf="!isImage(a)" class="file-icon">📎</div>
            <div class="attachment-info"><b>{{a.originalFileName}}</b><span>{{a.fileType}} · {{a.storageProvider}}</span></div>
            <button class="btn btn-ghost" type="button" (click)="removeAttachment(a)">Remove</button>
          </div>
        </div>
        <div class="muted" *ngIf="uploading">Uploading...</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end"><a class="btn btn-outline" routerLink="/learner/forum">Cancel</a><button class="btn btn-primary" [disabled]="loading||uploading">{{loading?'Saving...':(postId?'Update Post':'Create Post')}}</button></div>
    </form>
  </div>
</div>
