<div class="auth-page">
  <div class="auth-card">
    <a class="logo" routerLink="/"><span class="logo-mark">&lt;/&gt;</span><span><span class="dev">Dev</span>-Learning Hub</span></a>
    <div class="card card-pad">
      <h1 style="text-align:center;margin-bottom:6px">Xác minh email</h1>
      <div class="alert alert-ok" *ngIf="message">{{message}}</div>
      <div class="alert alert-error" *ngIf="error" style="white-space:pre-line">{{error}}</div>
      <form (ngSubmit)="verify()">
        <div class="form-group"><label>Email</label><input class="input" name="email" [(ngModel)]="model.email" required></div>
        <div class="form-group"><label>Token</label><input class="input" name="token" [(ngModel)]="model.token" required></div>
        <button class="btn btn-primary" type="submit" style="width:100%" [disabled]="loading">{{loading ? 'Đang xác minh...' : 'Xác minh email'}}</button>
      </form>
      <p class="muted" style="text-align:center"><a routerLink="/resend-verification">Gửi lại email xác minh</a></p>
    </div>
  </div>
</div>
