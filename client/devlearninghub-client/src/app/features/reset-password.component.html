<div class="auth-page">
  <div class="auth-card">
    <a class="logo" routerLink="/"><span class="logo-mark">&lt;/&gt;</span><span><span class="dev">Dev</span>-Learning Hub</span></a>
    <div class="card card-pad">
      <h1 style="text-align:center;margin-bottom:6px">Đặt lại mật khẩu</h1>
      <div class="alert alert-error" *ngIf="error" style="white-space:pre-line">{{error}}</div>

      <form (ngSubmit)="submit()" *ngIf="!sessionInvalid">
        <div class="form-group">
          <label>Mật khẩu mới</label>
          <input class="input" type="password" name="newPassword" [(ngModel)]="model.newPassword" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input class="input" type="password" name="confirmPassword" [(ngModel)]="model.confirmPassword" required autocomplete="new-password">
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%" [disabled]="loading">{{loading ? 'Đang lưu...' : 'Đặt lại mật khẩu'}}</button>
      </form>

      <p class="muted" style="text-align:center"><a routerLink="/forgot-password">Yêu cầu gửi lại email đặt mật khẩu</a></p>
      <p class="muted" style="text-align:center"><a routerLink="/login">Quay lại đăng nhập</a></p>
    </div>
  </div>
</div>
