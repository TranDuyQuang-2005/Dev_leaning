<div class="page">
  <div class="page-head">
    <div class="page-title">
      <h1>Notifications</h1>
      <p>{{ unreadCount ? unreadCount + ' thông báo chưa đọc' : 'Bạn đã đọc hết thông báo' }}</p>
    </div>
    <div class="action-row">
      <button class="btn btn-outline" type="button" (click)="load()">Refresh</button>
      <button class="btn btn-outline" type="button" (click)="markAllRead()" [disabled]="!unreadCount">Mark All as Read</button>
    </div>
  </div>

  <div class="alert" *ngIf="error">{{ error }}</div>
  <div class="empty-state card" *ngIf="!loading && !notifications.length">Chưa có thông báo nào.</div>
  <div class="empty-state card" *ngIf="loading">Đang tải thông báo...</div>

  <div class="grid" *ngIf="!loading && notifications.length">
    <div class="card card-pad notification" *ngFor="let item of notifications" [class.unread]="!item.isRead">
      <div class="forum-row">
        <div class="stat-icon" [ngClass]="typeClass(item)">
          <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
          </svg>
        </div>

        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;gap:12px">
            <div>
              <span class="badge">{{ typeLabel(item) }}</span>
              <h3 style="margin:6px 0 0">{{ item.title }}</h3>
            </div>
            <span class="badge badge-solid" *ngIf="!item.isRead">New</span>
          </div>
          <p>{{ item.message || item.content }}</p>
          <span class="muted">{{ date(item.createdAt) }}</span>

          <div class="action-row" style="margin-top:10px">
            <button class="btn btn-outline" type="button" *ngIf="item.linkUrl" (click)="open(item)">Mở</button>
            <button class="btn btn-ghost" type="button" *ngIf="!item.isRead" (click)="markRead(item)">Đã đọc</button>
            <button class="btn btn-ghost" type="button" (click)="delete(item)">Xóa</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
