<div class="auth-page">
  <div class="auth-card">
    <a class="logo" routerLink="/"><span class="logo-mark">&lt;/&gt;</span><span><span class="dev">Dev</span>-Learning Hub</span></a>
    <div class="card card-pad">
      <h1 style="text-align:center;margin-bottom:6px">Quên mật khẩu</h1>
      <p class="muted" style="text-align:center">Nhập email để nhận hướng dẫn đặt lại mật khẩu.</p>
      <div class="alert alert-ok" *ngIf="message">{{message}}</div>
      <div class="alert alert-error" *ngIf="error" style="white-space:pre-line">{{error}}</div>
      <form (ngSubmit)="submit()">
        <div class="form-group"><label>Email</label><input class="input" type="email" name="email" [(ngModel)]="email" required></div>
        <button class="btn btn-primary" type="submit" style="width:100%" [disabled]="loading">{{loading ? 'Đang gửi...' : 'Gửi yêu cầu đặt lại mật khẩu'}}</button>
      </form>
      <p class="muted" style="text-align:center"><a routerLink="/login">Quay lại đăng nhập</a></p>
    </div>
  </div>
</div>
