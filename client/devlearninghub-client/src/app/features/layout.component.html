<div class="app-shell">
  <aside class="sidebar">
    <a class="logo" routerLink="/">
      <span class="logo-mark">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
          <line x1="14" x2="10" y1="4" y2="20"></line>
        </svg>
      </span>
      <span><span class="dev">Dev</span>-Learning Hub</span>
    </a>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/learner/dashboard" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="m3 10 9-7 9 7"></path><path d="M5 10v10h14V10"></path><path d="M9 20v-6h6v6"></path></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/learner/learning" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path></svg>
        <span>Learning</span>
      </a>
      <a class="nav-item" routerLink="/learner/practice-banks" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
        <span>Tự luyện</span>
      </a>
      <a class="nav-item" routerLink="/learner/practice-attempts" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
        <span>Lịch sử tự luyện</span>
      </a>
      <a class="nav-item" routerLink="/learner/quiz-history" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path></svg>
        <span>Quiz History</span>
      </a>
      <a class="nav-item" routerLink="/learner/roadmap" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"></polygon><line x1="9" x2="9" y1="3" y2="18"></line><line x1="15" x2="15" y1="6" y2="21"></line></svg>
        <span>Roadmap</span>
      </a>
      <a class="nav-item" routerLink="/learner/playground" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" x2="20" y1="19" y2="19"></line></svg>
        <span>Playground</span>
      </a>
      <a class="nav-item" routerLink="/learner/problems" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7 12 3 4 7v10l8 4 8-4V7z"></path><path d="M9 12l2 2 4-4"></path></svg>
        <span>Problems</span>
      </a>
      <a class="nav-item" routerLink="/learner/submissions" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11 12 14 22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
        <span>Bài nộp của tôi</span>
      </a>
      <a class="nav-item" routerLink="/learner/forum" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg>
        <span>Forum</span>
      </a>
      <a class="nav-item" routerLink="/learner/leaderboard" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9H4a2 2 0 0 1-2-2V5h4"></path><path d="M18 9h2a2 2 0 0 0 2-2V5h-4"></path><path d="M6 2h12v7a6 6 0 0 1-12 0V2z"></path><path d="M12 15v5"></path><path d="M8 20h8"></path></svg>
        <span>Leaderboard</span>
      </a>
      <a class="nav-item" routerLink="/learner/profile" routerLinkActive="active">
        <svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M20 21a8 8 0 0 0-16 0"></path></svg>
        <span>Profile</span>
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <h2>{{pageTitle}}</h2>
        <p>{{pageSubtitle}}</p>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" type="button" (click)="toggleTheme()">
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"></path></svg>
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="M2 12h2"></path><path d="M20 12h2"></path></svg>
          <span class="theme-label">{{themeLabel}}</span>
        </button>
        <a class="icon-btn" routerLink="/learner/notifications">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="dot" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
        </a>
        <div class="topbar-user-menu">
          <a class="avatar" routerLink="/learner/profile" [title]="displayName">{{initials}}</a>
          <button class="logout-btn" type="button" (click)="logout()" title="Đăng xuất tài khoản">Đăng xuất</button>
        </div>
      </div>
    </header>
    <main class="content"><router-outlet /></main>
  </div>
</div>
