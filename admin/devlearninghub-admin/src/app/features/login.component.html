<div class="auth-page"><div class="auth-card"><div><a class="logo" href="http://localhost:4200"><span class="logo-mark"><svg aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline><line x1="14" x2="10" y1="4" y2="20"></line></svg></span><span><span class="dev">Dev</span>-Learning Hub</span></a></div><div class="card card-pad"><h1 style="text-align:center;margin-bottom:6px">Admin Login</h1><p class="muted" style="text-align:center">Manage platform content and users</p><div class="alert alert-error" *ngIf="error">{{error}}</div><form (ngSubmit)="submit()"><div class="form-group"><label>Email</label><input class="input" name="email" [(ngModel)]="emailOrUserName" type="text" placeholder="admin@example.com hoặc moderator@example.com"></div><div class="form-group"><label>Password</label><input class="input" name="password" [(ngModel)]="password" type="password" placeholder="••••••••"></div><button class="btn btn-primary" style="width:100%;margin-top:6px" type="submit" [disabled]="loading">{{loading?'Logging in...':'Login'}}</button></form><p class="muted" style="text-align:center">admin@example.com hoặc moderator@example.com / 123456Aa</p></div></div></div>
